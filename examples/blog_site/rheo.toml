version = "0.2.1"

# Relative to the rheo folder, if you specify a `oontent_dir`,
# all of the `exclude` patterns become relative to this folder.
content_dir = "content"

# Default formats to compile (if not specified via CLI flags)
# Options: "pdf", "html", "epub"
# Default: ["pdf", "html"]
# formats = ["html", "pdf"]

[html]
# When set, the HTML build emits build/html/feed.xml (Atom 1.0) with one entry
# per vertebra that declares `#let rheo-feed-title`. See severance-ep-*.typ.
feed_base_url = "https://example.com/severance"

[html.spine]
vertebrae = ["index.typ", "severance-*.typ"]

[pdf.spine]
merge = true 
vertebrae = ["severance-*.typ", "endmatter.typ"]
title = "Screening the Subject | Severance"

[epub.spine]
vertebrae = ["severance-*.typ"]
title = "Screening the Subject | Severance"
