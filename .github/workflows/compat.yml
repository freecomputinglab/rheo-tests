name: Compat

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compat:
    name: Compatibility tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone rheo as sibling
        shell: bash
        run: |
          git clone --depth 1 https://github.com/freecomputinglab/rheo.git ../rheo

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rheo-tests
            ../rheo

      - name: Install @rheo packages
        uses: ./.github/actions/install-rheo-packages

      - name: Run compatibility tests
        run: cargo test --test compat
        env:
          RUN_COMPAT_TESTS: "1"
          RHEO_MANIFEST: ${{ github.workspace }}/../rheo/Cargo.toml
          TYPST_IGNORE_SYSTEM_FONTS: "1"
