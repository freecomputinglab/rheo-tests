name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      rheo_ref:
        description: 'rheo branch/ref to test against (overrides branch-name convention)'
        default: ''
        required: false

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rheo-tests
        uses: actions/checkout@v5

      - name: Determine rheo ref
        id: rheo-ref
        shell: bash
        run: |
          # Priority: workflow_dispatch input > branch convention > main
          if [ -n "${{ inputs.rheo_ref }}" ]; then
            echo "ref=${{ inputs.rheo_ref }}" >> "$GITHUB_OUTPUT"
          else
            BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
            if [[ "$BRANCH" == rheo/* ]]; then
              echo "ref=${BRANCH#rheo/}" >> "$GITHUB_OUTPUT"
            else
              echo "ref=main" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Clone rheo at resolved ref
        shell: bash
        run: |
          git clone --depth 1 --branch "${{ steps.rheo-ref.outputs.ref }}" \
            https://github.com/freecomputinglab/rheo.git ../rheo

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: "10.21.0"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Build @rheo packages into cache
        shell: bash
        run: |
          rm -rf "$HOME/.cache/typst/packages/rheo"
          mkdir -p "$HOME/.cache/typst/packages"
          git clone https://github.com/freecomputinglab/rheo-packages.git \
            "$HOME/.cache/typst/packages/rheo"
          cd "$HOME/.cache/typst/packages/rheo"
          just build

      - name: Run tests
        run: cargo test --test harness
        env:
          RHEO_MANIFEST: ../rheo/Cargo.toml
          TYPST_IGNORE_SYSTEM_FONTS: "1"
