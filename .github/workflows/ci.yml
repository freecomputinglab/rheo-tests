name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone rheo as sibling
        shell: bash
        run: |
          git clone --depth 1 https://github.com/freecomputinglab/rheo.git ../rheo

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rheo-tests
            ../rheo

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Install @rheo packages
        uses: ./.github/actions/install-rheo-packages

      - name: Run tests
        run: cargo test --all-targets
        env:
          RHEO_MANIFEST: ${{ github.workspace }}/../rheo/Cargo.toml
          TYPST_IGNORE_SYSTEM_FONTS: "1"
