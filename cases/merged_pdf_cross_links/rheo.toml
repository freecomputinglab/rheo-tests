version = "0.4.0"
# Regression guard for rheo-gae: cross-file #link(<handle>) using synthesized
# handles must resolve inside a merged (SingleCombined) PDF. None of the files
# below define explicit labels, so if rheo stops injecting handle anchors into
# the combined document the PDF compile fails with "label does not exist".
formats = ["pdf"]

[pdf.spine]
merge = true
vertebrae = ["intro.typ", "chapter.typ", "appendix/notes.typ"]
title = "Merged PDF Cross Links"
